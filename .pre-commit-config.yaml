# pre-commit hooks for LLM-wiki
#
# Installed stages:
# - commit (default): structural lint (local) + gitleaks — fast, no API calls
# - push: contradict-check (LLM-judged, paid, slow)
#
# Install both stages with:
#   pre-commit install --hook-type pre-commit --hook-type pre-push

default_install_hook_types: [pre-commit, pre-push]

repos:
  # Structural lint — fast, local, no API calls, runs on commit
  - repo: local
    hooks:
      - id: lint-memory-structural
        name: structural lint (knowledge, blocking)
        # allowed-categories lists finding types that are pre-existing
        # vault debt and should NOT block new feature commits. They
        # still appear in the lint report for visibility, but the
        # commit proceeds. To force them blocking again, narrow this
        # list back to just `orphan_daily_logs`.
        entry: uv run python scripts/lint_memory.py --fail-on-findings --allowed-categories orphan_daily_logs missing_backlinks missing_sources_section temporal_validity
        language: system
        pass_filenames: false
        files: ^knowledge/.*\.md$
        description: >-
          Structural lint (12 checks). Blocking on broken_wikilinks,
          orphan_pages, missing_frontmatter, missing_required_type,
          invalid_supersede_chain, orphan_gaps (the categories that
          indicate real structural breakage). Pre-existing debt
          (missing_backlinks, missing_sources_section) is allowed
          through — tracked separately for cleanup.

      # Contradict-check — LLM-judged, paid, runs on push
      - id: lint-memory-contradictions
        name: contradict-check (LLM-judged)
        entry: uv run python scripts/lint_memory.py --contradictions
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: ^knowledge/notes/.*\.md$
        description: LLM-judged contradictions across knowledge pages — costs API calls, runs on push only.

  # Gitleaks — secret scanning, runs on commit
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        description: Detect hardcoded secrets — API keys, tokens, credentials.
