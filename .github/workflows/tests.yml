name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        # TODO: SHA-pin before next release. Look up the commit SHA for
        # v4.2.2 at https://github.com/actions/checkout/releases and replace
        # the tag with the immutable SHA: uses: actions/checkout@<sha>
        uses: actions/checkout@v4.2.2

      - name: Gitleaks
        # Run once on Linux: Gitleaks publishes a Linux tarball but its action
        # incorrectly requests a Windows tar.gz archive instead of the zip.
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: 8.30.1

  pytest-and-lint:
    # Cross-platform matrix: the project ships Windows-specific codepaths
    # (PowerShell wrappers, win32 PID probes, encoding guards) that
    # ubuntu-only CI would silently miss.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        # TODO: SHA-pin before next release. Look up the commit SHA for
        # v4.2.2 at https://github.com/actions/checkout/releases and replace
        # the tag with the immutable SHA: uses: actions/checkout@<sha>
        uses: actions/checkout@v4.2.2

      - name: Install uv
        # TODO: SHA-pin before next release. Look up the commit SHA for
        # v5.4.2 at https://github.com/astral-sh/setup-uv/releases and
        # replace the tag with the immutable SHA.
        uses: astral-sh/setup-uv@v5.4.2
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Pin Python ${{ matrix.python }}
        run: uv python pin ${{ matrix.python }}

      - name: Sync dev dependencies
        run: uv sync --locked --dev

      - name: Ruff (Python static analysis)
        # Catches undefined names, unused imports, syntax regressions that
        # the test suite doesn't exercise. Zero config beyond pyproject.toml.
        run: uv run ruff check scripts/ tests/

      - name: Structural lint (knowledge tree, blocking)
        # --fail-on-findings enforces structural integrity (broken wikilinks,
        # missing frontmatter, invalid supersede chains, orphan gaps).
        # Pre-existing debt categories are exempted — tracked for visibility
        # but don't block CI.
        run: uv run python scripts/lint_memory.py --scope all --fail-on-findings --allowed-categories orphan_daily_logs missing_backlinks missing_sources_section temporal_validity

      - name: Regression test suite (hermetic)
        # conftest.py bootstraps LLM_WIKI_ROOT / LLM_WIKI_STATE_ROOT
        # and defaults MEMORY_LLM_PROVIDER to "fake" — no live LLM calls.
        run: uv run pytest tests/ -q
